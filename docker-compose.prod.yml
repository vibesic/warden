services:
  backend:
    image: dockazawa/proctor-backend:latest
    ports:
      - "3333:3333"
    volumes:
      - backend_data:/app/data
      - uploads_data:/app/uploads
    # Comment this out for external users or provide a blank .env
    # env_file:
    #   - ./backend/.env
    environment:
      - DATABASE_URL=file:./data/dev.db?connection_limit=1
      - NODE_ENV=production
      - PORT=3333
      - UPLOADS_DIR=/app/uploads
      - TEACHER_PASSWORD=Proctor2026
    networks:
      - exam-network

  frontend:
    image: dockazawa/proctor-frontend:latest
    ports:
      - "80:80"
    volumes: []
    environment:
      # Set this to the IP address of the teacher's laptop on the LAN, 
      # e.g., http://192.168.1.100:3333
      - VITE_API_URL=http://localhost:3333 
    networks:
      - exam-network

networks:
  exam-network:
    driver: bridge

volumes:
  backend_data:
  uploads_data:
