services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile.prod
    ports:
      - "3333:3333"
    volumes:
      - backend_data:/app/data
      - uploads_data:/app/uploads
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=file:./data/dev.db?connection_limit=1
      - NODE_ENV=production
      - PORT=3333
      - UPLOADS_DIR=/app/uploads
      - TEACHER_PASSWORD=Proctor2026
    networks:
      - exam-network

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "80:80"
    volumes: []
    environment:
      # In production, change this to the IP address of the teacher's laptop on the LAN, 
      # e.g., http://192.168.1.100:3333
      # Or rely on the lan-wsl.sh script to override it automatically
      - VITE_API_URL=http://localhost:3333 
    networks:
      - exam-network

networks:
  exam-network:
    driver: bridge

volumes:
  backend_data:
  uploads_data:
