services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3333:3333"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - backend_data:/app/data
    environment:
      - DATABASE_URL=file:./data/dev.db
      - NODE_ENV=development
    networks:
      - exam-network

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3333
    networks:
      - exam-network

networks:
  exam-network:
    driver: bridge

volumes:
  backend_data:
