services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4444:4444"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - backend_data:/app/data
    environment:
      - DATABASE_URL=file:./data/dev.db
      - NODE_ENV=development
      - PORT=4444
      - CORS_ORIGINS=http://localhost:5174
      - TOKEN_SECRET=dev-secret-do-not-use-in-production
    networks:
      - exam-network

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5174:5174"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:4444
    networks:
      - exam-network

networks:
  exam-network:
    driver: bridge

volumes:
  backend_data:
